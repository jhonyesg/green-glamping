<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — Multibot</title>
    <link rel="stylesheet" href="/admin/static/style.css">
</head>
<body class="login-page">
    <div class="login-card">
        <h1>🤖 Multibot</h1>
        <p class="login-subtitle">Plataforma de Atención Multi-Canal</p>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/admin/login{% if request.query_params.get('next') %}?next={{ request.query_params.get('next') }}{% endif %}">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input class="form-control" id="username" name="username" type="text"
                       required autofocus autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input class="form-control" id="password" name="password" type="password"
                       required autocomplete="current-password">
            </div>
            <button class="btn btn-primary" type="submit" style="width:100%;margin-top:.5rem">
                Ingresar
            </button>
        </form>
    </div>
</body>
</html>
